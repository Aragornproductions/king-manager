name: king_manager
description: "King Manager - the ultimate free file manager with themes and a private locker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  open_filex: ^4.4.0
  local_auth: ^2.2.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
